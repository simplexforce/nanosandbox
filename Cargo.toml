[package]
edition = "2021"
name = "nanosandbox"
version = "0.1.0"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Lightweight cross-platform sandbox for secure code execution"
readme = "README.md"
keywords = [
    "sandbox",
    "container",
    "security",
    "isolation",
    "cross-platform",
]
categories = [
    "os::linux-apis",
    "development-tools",
]
